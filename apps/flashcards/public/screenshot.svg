<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Crazy Flashcards">
  <rect width="640" height="400" fill="#141414"/>
  <circle cx="30" cy="30" r="46" fill="#f72585" opacity=".9"/>
  <circle cx="610" cy="360" r="34" fill="#ffd60a" opacity=".9"/>
  <g transform="translate(320 205)">
    <rect x="-150" y="-105" width="300" height="210" rx="26" fill="#4cc9f0" transform="rotate(-8) scale(.94)" opacity=".5"/>
    <rect x="-150" y="-105" width="300" height="210" rx="26" fill="#ffd60a" transform="rotate(5) scale(.97)" opacity=".7"/>
    <g transform="rotate(-2)">
      <rect x="-150" y="-105" width="300" height="210" rx="26" fill="#f72585"/>
      <text x="0" y="6" text-anchor="middle" font-family="'Lilita One','Arial Black',sans-serif" font-size="40" font-weight="900" fill="#111">el perro</text>
      <text x="0" y="66" text-anchor="middle" font-family="Nunito,Arial,sans-serif" font-size="14" font-weight="700" fill="rgba(0,0,0,.5)">tap to flip</text>
      <g transform="translate(-118 -78) rotate(-14)">
        <rect x="-8" y="-18" width="112" height="34" rx="8" fill="none" stroke="#06d6a0" stroke-width="4"/>
        <text x="48" y="7" text-anchor="middle" font-family="'Lilita One','Arial Black',sans-serif" font-size="18" fill="#06d6a0">KNOW IT</text>
      </g>
    </g>
  </g>
  <text x="320" y="52" text-anchor="middle" font-family="'Lilita One','Arial Black',sans-serif" font-size="30" fill="#fff" transform="rotate(-2 320 52)">Flashcards!</text>
  <circle cx="256" cy="356" r="24" fill="#ff5d5d"/>
  <text x="256" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#fff">✕</text>
  <circle cx="384" cy="356" r="24" fill="#06d6a0"/>
  <text x="384" y="364" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#fff">✓</text>
</svg>
